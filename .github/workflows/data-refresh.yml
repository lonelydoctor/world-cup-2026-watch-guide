name: Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh schedule data
    runs-on: ubuntu-latest

    steps:
      - name: Tournament date guard
        id: window
        run: |
          today="$(date -u +%Y-%m-%d)"
          if [[ "$today" < "2026-06-11" || "$today" > "2026-07-20" ]]; then
            echo "run_refresh=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_refresh=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.window.outputs.run_refresh == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.window.outputs.run_refresh == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.window.outputs.run_refresh == 'true'
        run: npm ci

      - name: Refresh data
        if: steps.window.outputs.run_refresh == 'true'
        run: npm run refresh:data

      - name: Validate refreshed data
        if: steps.window.outputs.run_refresh == 'true'
        run: npm run test:data

      - name: Commit refreshed data
        if: steps.window.outputs.run_refresh == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/worldcup.generated.json src/data/match-number-map.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh world cup data"
            git push
          fi
